name: e2e-tests

# only on PRs and workflow-dispatch
on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  manual_approval_job:
    runs-on: ubuntu-latest
    environment:
      name: requires-approval # Reference the environment created in Step 1
    steps:
      - name: Awaiting Approval
        run: echo "Waiting for manual approval"

  e2e:
    name: e2e-tests
    needs: [manual_approval_job]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # <--- This is required to read from GHCR
    services:
      partyserver:
        image: featurehub/party-server:latest
        ports:
          - 8085:8085
          - 8701:8701
    env:
      FEATUREHUB_BASE_URL: http://partyserver:8085
      FEATUREHUB_EDGE_URL: http://partyserver:8085
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Check containers
        run: |
          docker ps

      - name: Wait for party-server to be ready
        run: |
          echo "Waiting for party-server on port 8085..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8701/health/liveness > /dev/null 2>&1; then
              echo "party-server is ready"
              exit 0
            fi
            echo "  attempt $i/60 — not ready yet, retrying in 2s"
            sleep 2
          done
          echo "party-server did not become ready in time"
          exit 1

      - name: Run featurehub setup image and make it output the env file required for the todoserver to run
        run: |
          mkdir adk-env && \
          docker run --rm \
            --network ${{ job.container.network }} \
            -v $PWD/adk-env:/opt/e2e \
            -e WRITE_ENV_FOR_E2E=/opt/e2e/server.env \
            -e DEBUG=true \
            -e FEATUREHUB_BASE_URL \
            -e FEATUREHUB_EDGE_URL \
            --name featurehub-setup \
            ghcr.io/featurehub-io/featurehub-io/featurehub:main-adk-e2e \
            /bin/bash -c "env && pnpm run test --tags '@demoexamples'" && \
          ls -l adk-env

      - name: Verify server.env exists and is non-empty
        run: |
          if [ ! -s adk-env/server.env ]; then
            echo "server.env is missing or empty"
            exit 1
          fi
          echo "server.env contents:"
          cat adk-env/server.env

      - name: Build todo-server image
        run: docker build -t todo-server:e2e -f Dockerfile.e2e .

      - name: Run todo-server
        run: |
          docker run -d \
            --network ${{ job.container.network }} \
            --name todo-server \
            -p 8099:8099 \
            --workdir /sdk/examples/todo-backend-typescript \
            --env-file adk-env/server.env \
             todo-server:e2e \
            /bin/bash -c "pnpm run start"

      - name: Wait for todo-server to be ready
        run: |
          echo "Waiting for todo-server on port 8099..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8099/health/liveness > /dev/null 2>&1; then
              echo "todo-server is ready"
              exit 0
            fi
            echo "  attempt $i/30 — not ready yet, retrying in 2s"
            sleep 2
          done
          echo "todo-server did not become ready in time"
          docker logs todo-server
          exit 1

      - name: Run the Javascript client side e2e tests for SSE
        # this step can hang, so force a timeout
        timeout-minutes: 10
        run: |
          echo "Running j2-sdk tests using SSE default"
          docker run --rm \
            --network ${{ job.container.network }} \
            -v $PWD/adk-env:/opt/e2e \
            -e APP_SERVER_URL=http://todo-server:8099 \
            --env-file adk-env/server.env \
            --workdir /sdk/examples/todo-server-tests \
            --name jsdk-sse-client \
            todo-server:e2e \
            /bin/bash -c "pnpm run test"

      - name: Run todo-server again but in polling mode
        run: |
          docker stop todo-server && docker rm -f todo-server && \
          docker run -d \
            --network ${{ job.container.network }} \
            -e FEATUREHUB_POLLING_INTERVAL=3s \
            --name todo-server \
            -p 8099:8099 \
            --workdir /sdk/examples/todo-backend-typescript \
            --env-file adk-env/server.env \
             todo-server:e2e \
            /bin/bash -c "pnpm run start"

      - name: Wait for todo-server to be ready again
        run: |
          echo "Waiting for todo-server on port 8099..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8099/health/readiness > /dev/null 2>&1; then
              echo "todo-server is ready"
              exit 0
            fi
            echo "  attempt $i/30 — not ready yet, retrying in 2s"
            sleep 2
          done
          echo "todo-server did not become ready in time"
          docker logs todo-server
          exit 1

      - name: Run the Javascript client side e2e tests again using SSE (as we aren't testing the js-sdk)
        # this step can hang, so force a timeout
        timeout-minutes: 10
        run: |
          echo "Running j2-sdk tests using SSE default"
          docker run --rm \
            --network ${{ job.container.network }} \
            -v $PWD/adk-env:/opt/e2e \
            -e FEATUREHUB_POLLING_INTERVAL=3s \
            -e APP_SERVER_URL=http://todo-server:8099 \
            --env-file adk-env/server.env \
            --workdir /sdk/examples/todo-server-tests \
            --name jsdk-poll-client \
            todo-server:e2e \
            /bin/bash -c "pnpm run test"

      - name: Print logs on failure
        if: failure()
        run: |
          echo "=== party-server logs ==="
          docker logs party-server 2>/dev/null || true
          echo "=== todo-server logs ==="
          docker logs todo-server 2>/dev/null || true

      - name: Tear down
        if: always()
        run: |
          docker rm -f party-server todo-server 2>/dev/null || true
          docker network rm fh-e2e 2>/dev/null || true
