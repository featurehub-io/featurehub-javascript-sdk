  - flatted@3.4.2
  - brace-expansion@1.1.13
  - brace-expansion@2.0.3
  - brace-expansion@5.0.5
  - picomatch@2.3.2
  - picomatch@4.0.4
  - yaml@2.8.3
  - path-to-regexp@8.4.0
  - follow-redirects@1.15.12
  - axios@1.15.0
  - postcss@8.5.10
  - immutable@5.1.5
  - protobufjs@7.5.5
